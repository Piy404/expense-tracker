<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Student Capstone</title>
    <meta name="description" content="A simple, human-coded, and responsive expense tracker app using pure HTML, CSS, and Vanilla JS.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="tracker-header">
            <h2>Expense Tracker</h2>
            <div class="balance-container">
                <h4>Your Balance</h4>
                <h1 id="balance">₹0.00</h1>
            </div>
            
            <div class="summary-container">
                <div class="summary-box income">
                    <h4>Income</h4>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div class="summary-box expense">
                    <h4>Expense</h4>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>
        </header>
 
        <section class="history-section">
            <h3>History</h3>
            <ul id="list" class="list"></ul>
        </section>
 
        <section class="add-section">
            <h3>Add New Transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="text">Description</label>
                    <input type="text" id="text" placeholder="e.g., Tamhini Ghat Trek Fuel" required />
                </div>
                <div class="form-control">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="Enter amount..." required />
                </div>
                <div class="form-control">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="" disabled selected>Select type...</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <button class="btn" type="submit">Add Transaction</button>
            </form>
        </section>
    </div>
</body>
</html>
